<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Note Trainer</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.3/build/cjs/vexflow.js"></script>
<!-- Cloudflare Web Analytics -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "751dcd38828244dda0494016f62ef230"}'></script>
<!-- End Cloudflare Web Analytics -->
</head>
<body>
<div id="app">

  <header id="topbar">
    <div id="titleRow">
      <div id="title">Note Trainer</div>
      <button id="settingsBtn" aria-label="Settings"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
    <div id="stats">
      <span id="sessionsStat">Sessions: 0</span>
      <span id="accStat">Accuracy: 0%</span>
    </div>
  </header>

  <div id="introToast">
    Each round is 10 questions — mistakes are OK, just keep going! Watch the staff for a new note each round.
  </div>

  <main>
    <div id="gradeRow">
      <button class="modeBtn" data-grade="basic">Basic</button>
      <button class="modeBtn" data-grade="grade1">Grade 1</button>
    </div>

    <div id="modeRow">
      <button class="modeBtn clefBtn" data-mode="treble">&#119070;</button>
      <button class="modeBtn clefBtn" data-mode="bass">&#119074;</button>
      <button class="modeBtn clefBtn" data-mode="mix">&#119070;&#119074;</button>
    </div>

    <div id="clefRow">
      <div id="questionCounter">Question 0/10</div>
    </div>

    <div id="staffWrap">
      <div id="staff"></div>
      <div id="pausedOverlay">Paused</div>
    </div>

    <div id="timerRow">
      <div id="timerBar"><div id="timerFill"></div></div>
      <div id="timerNum">5</div>
    </div>

    <div id="messageArea">
      <div id="feedback"></div>
      <div id="greetingRow"></div>
      <div id="namePromptRow">
        <input id="nameInput" type="text" placeholder="Your name" maxlength="20">
        <button id="nameSaveBtn">Save</button>
        <button id="nameDismissBtn" aria-label="Dismiss">&times;</button>
      </div>
    </div>

    <div id="answers"></div>

    <div id="summaryOverlay">
      <div id="summaryCard">
        <div id="summaryTitle">Session Complete</div>
        <div id="summaryScore">0/10</div>
        <div id="summaryRow"><span>Accuracy</span><span id="summaryAccuracy">0%</span></div>
        <div id="summaryRow"><span>Avg answer time</span><span id="summarySpeed">0.0s</span></div>
        <svg id="summarySpark" viewBox="0 0 220 50" preserveAspectRatio="none"></svg>
        <div id="summaryImprovement"></div>
        <div id="summaryThanks">Thanks for practicing!</div>
        <div id="summaryBtnRow">
          <button id="playAgainBtn">Play Again</button>
          <button id="homeBtn">Home</button>
        </div>
      </div>
    </div>

    <div id="settingsOverlay">
      <div id="settingsCard">
        <button id="closeSettingsBtn" aria-label="Close">&times;</button>
        <div id="settingsTitle">Settings</div>
        <div id="settingsRow">
          <span>Key press sound</span>
          <button id="soundToggleBtn" class="toggleBtn" aria-pressed="true">On</button>
        </div>
        <button id="resetStatsBtn">Reset Stats</button>
        <div id="versionInfo"></div>
      </div>
    </div>
  </main>

  <footer>
    <button id="playPauseBtn"></button>
    <button id="stopBtn" disabled><svg class="icon" viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" fill="currentColor"/></svg> Stop</button>
  </footer>

</div>
<script src="app.js"></script>
</body>
</html>
